<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlackTrace OSINT</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --void:#06070a;
  --s1:#0c0d10;
  --s2:#111315;
  --b1:rgba(255,255,255,0.07);
  --t1:#efefef;
  --t3:#7a7a7a;
  --font:'Inter',sans-serif;
  --mono:'JetBrains Mono',monospace;
}

body{
  margin:0;
  background:var(--void);
  color:var(--t1);
  font-family:var(--font);
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero-title{
  font-size:72px;
  font-weight:600;
}

.hero-sub{
  font-size:22px;
  color:var(--t3);
  margin-bottom:30px;
}

.hero-btn{
  padding:14px 40px;
  border-radius:8px;
  border:1px solid var(--b1);
  background:rgba(255,255,255,0.05);
  cursor:pointer;
  color:white;
  font-weight:600;
}

.hero-btn:hover{
  background:rgba(255,255,255,0.1);
}

/* TOOL */
#tool{
  width:600px;
  display:none;
  margin-top:40px;
}

input{
  width:100%;
  padding:14px;
  background:var(--s2);
  border:1px solid var(--b1);
  border-radius:8px;
  color:white;
  margin-bottom:10px;
}

.result{
  margin-top:20px;
  background:var(--s1);
  padding:20px;
  border-radius:10px;
  border:1px solid var(--b1);
}
</style>
</head>

<body>

<div class="hero">
  <div class="hero-title">BlackTrace</div>
  <div class="hero-sub">OSINT Intelligence Platform</div>
  <button class="hero-btn" onclick="openTool()">IP Lookup</button>
</div>

<div id="tool">
  <input id="ip" placeholder="Enter IP address (e.g. 8.8.8.8)">
  <button class="hero-btn" onclick="lookup()">Search</button>

  <div id="output"></div>
</div>

<script>
const API_KEY = "c4d1ca528c4c9810e60c41f9f0dbdabc42d40797cb88813aa6bcaf3e80d2fc417ebd99d7ccccbb7a";

function openTool(){
  document.getElementById("tool").style.display="block";
  window.scrollTo({top:document.body.scrollHeight,behavior:"smooth"});
}

async function lookup(){
  const ip=document.getElementById("ip").value;
  const out=document.getElementById("output");

  if(!ip){
    out.innerHTML="<p style='color:red'>Enter an IP</p>";
    return;
  }

  out.innerHTML="Loading...";

  try{
    const res=await fetch(`https://api.abuseipdb.com/api/v2/check?ipAddress=${ip}&maxAgeInDays=90`,{
      headers:{
        "Key":API_KEY,
        "Accept":"application/json"
      }
    });

    const data=await res.json();
    const d=data.data;

    let color="lime";
    if(d.abuseConfidenceScore>60) color="red";
    else if(d.abuseConfidenceScore>20) color="orange";

    out.innerHTML=`
      <div class="result">
        <h3>IP Analysis</h3>
        <p><b>IP:</b> ${d.ipAddress}</p>
        <p><b>Country:</b> ${d.countryCode}</p>
        <p><b>ISP:</b> ${d.isp}</p>
        <p><b>Domain:</b> ${d.domain}</p>
        <p><b>Usage:</b> ${d.usageType}</p>
        <p><b>Reports:</b> ${d.totalReports}</p>
        <p><b>Last Report:</b> ${d.lastReportedAt || "None"}</p>
        <p><b>Abuse Score:</b> <span style="color:${color}">${d.abuseConfidenceScore}</span></p>
      </div>
    `;
  }catch(e){
    out.innerHTML="<p style='color:red'>Error fetching data</p>";
  }
}
</script>

</body>
</html>
